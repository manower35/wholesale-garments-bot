name: Bot CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Syntax Check
      run: |
        # Compiles all python files to ensure there are no compilation or syntax errors
        python -m py_compile main.py db.py config.py ai_agent.py handlers_user.py handlers_admin.py vector_db.py

    - name: Build Docker Image
      run: |
        docker build -t wholesale-garments-bot:latest .
